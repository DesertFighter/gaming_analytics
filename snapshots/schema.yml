version: 2

snapshots:
  - name: snp_players
    description: "SCD Type 2 history of player profile changes (account_tier upgrades, etc.)."
    columns:
      - name: player_id
        description: "Natural key — player identifier."
      - name: dbt_scd_id
        description: "Surrogate key for each snapshot row (auto-generated by dbt)."
      - name: dbt_valid_from
        description: "When this record version became active."
      - name: dbt_valid_to
        description: "When this record version expired. NULL = current record."

  - name: snp_games
    description: "SCD Type 2 history of game catalogue changes (rating, genre updates)."
    columns:
      - name: game_id
        description: "Natural key — game identifier."
      - name: dbt_scd_id
        description: "Surrogate key for each snapshot row."
      - name: dbt_valid_from
        description: "When this record version became active."
      - name: dbt_valid_to
        description: "When this record version expired. NULL = current record."