vars:
  min_spend_amount: 10
name: 'gaming_analytics'
version: '1.0.0'
config-version: 2

profile: 'gaming_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================
# MODEL CONFIGURATIONS - Medallion Architecture
# =============================================================
models:
  gaming_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ['intermediate']
      +pre-hook:  "{{ log('[PRE]  Building: ' ~ this, info=true) }}"
      +post-hook: "{{ log('[POST] Finished: ' ~ this, info=true) }}"
    marts:
      +materialized: table
      +schema: marts

# =============================================================
# SEED CONFIGURATIONS
# =============================================================
seeds:
  gaming_analytics:
    +schema: seeds

# =============================================================
# SNAPSHOT CONFIGURATIONS
# =============================================================
snapshots:
  gaming_analytics:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at
