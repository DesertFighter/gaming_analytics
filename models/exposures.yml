      Executive dashboard showing player revenue, purchase trends,
      and spend tier distribution. Pulls from mart layer daily.
    depends_on:
      - ref('fct_purchases')
      - ref('dim_players')
      - ref('dim_games')
    owner:
      name: Fadi Abusafat
      email: smartdataengineer2025@gmail.com

