version: 2

models:

  - name: int_players_enriched
    description: "Players enriched with region and country from stg_regions."
    columns:
      - name: player_key
        tests: [unique, not_null]
      - name: player_id
        tests: [unique, not_null]
      - name: username
        tests: [not_null]
      - name: region
        tests: [not_null]

  - name: int_games_enriched
    description: "Games enriched with publisher_name and genre_name."
    columns:
      - name: game_key
        tests: [unique, not_null]
      - name: game_id
        tests: [unique, not_null]
      - name: publisher_name
        tests: [not_null]
      - name: genre_name
        tests: [not_null]

  - name: int_purchases_enriched
    description: "Purchases enriched with player and game context."
    columns:
      - name: purchase_key
        tests: [unique, not_null]
      - name: purchase_id
        tests: [unique, not_null]
      - name: spend_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Low', 'Medium', 'High', 'Whale']

  - name: int_sessions_enriched
    description: "Sessions enriched with player and game context."
    columns:
      - name: session_key
        tests: [unique, not_null]
      - name: session_id
        tests: [unique, not_null]

  - name: int_achievement_unlocks_enriched
    description: "Achievement unlocks enriched with player, achievement, and game context."
    columns:
      - name: unlock_key
        tests: [unique, not_null]
      - name: username
        tests: [not_null]

  - name: int_matches_enriched
    description: "Matches enriched with game publisher and genre."
    columns:
      - name: match_key
        tests: [unique, not_null]
      - name: match_id
        tests: [unique, not_null]
      - name: publisher_name
        tests: [not_null]